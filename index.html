<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Portfolio GMP</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { font-family: sans-serif; margin: 0; background: #f4f4f9; color: #333; }
        header { background: #2c3e50; color: white; padding: 2rem; text-align: center; }
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Style de la visionneuse 3D */
        model-viewer {
            width: 100%;
            height: 400px;
            background-color: #eee;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<header>
    <h1>Prénom Nom</h1>
    <p>Étudiant en BUT Génie Mécanique et Productique</p>
</header>

<div class="container">
    <section class="card">
        <h2>À propos</h2>
        <p>Bienvenue sur mon portfolio. Je présente ici mes projets de conception, de fabrication et mes SAÉ.</p>
    </section>

    <section class="card">
        <h2>Projet Majeur : Ma pièce en 3D</h2>
        <model-viewer src="Machoire.glb" 
                      alt="Un modèle 3D de mon projet" 
                      auto-rotate camera-controls>
        </model-viewer>
        <p>Description de la pièce : Réalisée sous SolidWorks, exportée en .glb</p>
    </section>
</div>

</body>
</html>
